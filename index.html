<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashNotícias</title>

<style>
body { margin:0; font-family: Arial; background:#eef1f5 }
header { background:#c40000; color:#fff; padding:20px; text-align:center }
.container { max-width:1000px; margin:auto; padding:20px }

.card {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px;
}

.destaque {
  background:#ffcc00;
  padding:10px;
  margin-bottom:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>⚡ FlashNotícias</h1>
</header>

<div class="container" id="app">
🔄 A carregar notícias...
</div>

<script>

// 🔥 API PRINCIPAL
const API1 = "https://gnews.io/api/v4/top-headlines?lang=pt&max=10&token=demo";

// 🔥 API BACKUP (SEM KEY)
const API2 = "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/rss.xml";

// abrir
function abrir(url){
  if(url) window.open(url, "_blank");
}

// criar card
function criarCard(n){

  const card = document.createElement("div");
  card.className = "card";
  card.onclick = () => abrir(n.url);

  const img = document.createElement("img");
  img.src = n.image || n.thumbnail || "https://via.placeholder.com/800x400?text=Noticia";
  img.onerror = () => img.remove();

  const h2 = document.createElement("h2");
  h2.textContent = n.title;

  card.appendChild(img);
  card.appendChild(h2);

  return card;
}

// carregar GNews
async function carregarGNews(){
  const res = await fetch(API1);
  const data = await res.json();
  return data.articles;
}

// carregar RSS
async function carregarRSS(){
  const res = await fetch(API2);
  const data = await res.json();

  return data.items.map(i => ({
    title: i.title,
    url: i.link,
    image: i.thumbnail
  }));
}

// principal
async function loadNews(){

  const container = document.getElementById("app");

  try {

    let artigos = [];

    try {
      artigos = await carregarGNews();
    } catch {
      artigos = [];
    }

    if(!artigos || artigos.length === 0){
      artigos = await carregarRSS();
    }

    container.innerHTML = "";

    // destaque
    const destaque = document.createElement("div");
    destaque.className = "destaque";
    destaque.textContent = artigos[0]?.title || "Notícia";
    container.appendChild(destaque);

    artigos.slice(0,10).forEach(n=>{
      container.appendChild(criarCard(n));
    });

  } catch(e){
    container.innerHTML = "Erro ao carregar notícias";
  }
}

loadNews();

</script>

</body>
</html>
