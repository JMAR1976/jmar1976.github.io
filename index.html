```html
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="VmGN_6lB30wphsQ4v-vTdsv3Wyax4XMeylYzYD5EHHQ" />
<title>Notícias Mais Pesquisadas</title>

<!-- Google AdSense -->
<script async
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5386266174463642"
  crossorigin="anonymous"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:white;
}
body.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:20px;
  text-align:center;
  background:#020617;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}
img{
  width:100%;
  border-radius:10px;
}
button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}
footer{
  text-align:center;
  padding:20px;
  background:#020617;
  margin-top:40px;
}
a{color:#38bdf8;}
h2{margin-top:40px;}
.ad-container{
  text-align:center;
  margin:20px auto;
}
</style>
</head>

<body>

<header>
<h1 id="title">🌐 Notícias Mais Pesquisadas no Mundo</h1>
<p id="updateDate"></p>
<p><span id="visitorText">Visitantes:</span> <span id="visitorCount">...</span></p>

<button onclick="toggleLanguage()">🌍 PT / EN</button>
<button onclick="toggleTheme()">🌙 Tema</button>
</header>

<!-- Google AdSense -->
<div class="ad-container">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-5386266174463642"
       data-ad-slot="SEU_SLOT_ID"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<div class="container" id="newsContainer"></div>

<footer>
<p>Este website funciona como agregador de notícias, mostrando apenas títulos, resumos e links para as fontes oficiais.</p>
<p><a href="legal.html">Aviso Legal</a></p>
</footer>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

const topics = [
  {pt:"Inteligência Artificial",en:"Artificial Intelligence",search:"artificial intelligence"},
  {pt:"Tecnologia",en:"Technology",search:"technology"},
  {pt:"Medicina",en:"Medicine",search:"medicine"},
  {pt:"Ciência",en:"Science",search:"science"},
  {pt:"Espaço",en:"Space",search:"space"},
  {pt:"Energia",en:"Energy",search:"energy"},
  {pt:"Robótica",en:"Robotics",search:"robotics"},
  {pt:"Computação Quântica",en:"Quantum Computing",search:"quantum"},
  {pt:"Alterações Climáticas",en:"Climate Change",search:"climate"},
  {pt:"Smartphones",en:"Smartphones",search:"smartphone"},
  {pt:"Internet",en:"Internet",search:"internet"},
  {pt:"Cibersegurança",en:"Cybersecurity",search:"cybersecurity"}
];

// CONTADOR DE VISITAS
async function updateVisitorCount(){
  try{
    const response = await fetch(
      "https://api.countapi.xyz/hit/jmar-tech-news-site/visits"
    );

    if(!response.ok) throw new Error("Erro API");

    const data = await response.json();
    document.getElementById("visitorCount").innerText = data.value;

  }catch(error){
    console.error("Erro no contador:", error);
    document.getElementById("visitorCount").innerText = "Indisponível";
  }
}

updateVisitorCount();

let lang="pt";

function toggleLanguage(){
  lang = lang==="pt" ? "en" : "pt";
  loadAllNews();

  if(lang==="en"){
    document.getElementById("title").innerText="🌐 Most Searched News in the World";
    document.getElementById("visitorText").innerText="Visitors:";
  }else{
    document.getElementById("title").innerText="🌐 Notícias Mais Pesquisadas no Mundo";
    document.getElementById("visitorText").innerText="Visitantes:";
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

async function loadAllNews(){
  const container=document.getElementById("newsContainer");
  container.innerHTML="";

  for(let topic of topics){
    try{
      const res=await fetch(
        "https://api.spaceflightnewsapi.net/v4/articles/?search="+topic.search
      );

      const data=await res.json();

      let title=lang==="pt" ? topic.pt : topic.en;
      let section=`<h2>${title}</h2><div class="grid">`;

      data.results.slice(0,4).forEach(a=>{
        section+=`
          <div class="card">
            <img src="${a.image_url}" alt="${a.title}" loading="lazy"
                 onerror="this.style.display='none'">
            <h3>${a.title}</h3>
            <p>${a.summary}</p>
            <a href="${a.url}" target="_blank" rel="noopener noreferrer">Read more</a>
          </div>
        `;
      });

      section+="</div>";
      container.innerHTML+=section;

    }catch(err){
      console.error("Erro ao carregar notícias:", err);
    }
  }

  document.getElementById("updateDate").innerText=
    (lang==="pt" ? "Atualizado: " : "Updated: ")+
    new Date().toLocaleDateString();
}

loadAllNews();
setInterval(loadAllNews, 86400000);
</script>

</body>
</html>
