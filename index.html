<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Notícias do Mundo em Destaque</title>

<meta name="description" content="Últimas notícias de Portugal e do mundo atualizadas ao minuto">
<meta name="robots" content="index, follow">

<link rel="icon" href="icon-192.png">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=SEU_ID"
crossorigin="anonymous"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;}
header{text-align:center;padding:20px;background:#020617;}
nav{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:10px;background:#020617;}
nav a{color:#38bdf8;text-decoration:none;font-weight:bold;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:15px;margin-bottom:20px;border-radius:12px;}
.card img{width:100%;border-radius:10px;}
button{background:#22c55e;color:#000;padding:10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.reco{background:#020617;padding:10px;border-radius:10px;margin-top:10px;}
a{color:#38bdf8;}
</style>
</head>

<body>

<header>
<h1>📰 Notícias do Mundo em Destaque</h1>
<p>Atualidade em tempo real</p>
</header>

<nav>
<a href="index.html">Início</a>
<a href="?tema=geral">Geral</a>
<a href="?tema=tecnologia">Tecnologia</a>
<a href="?tema=economia">Economia</a>
<a href="?tema=desporto">Desporto</a>
<a href="?tema=mundo">Mundo</a>

<a href="melhores-telemoveis.html">📱 Telemóveis</a>
<a href="melhores-portateis.html">💻 Portáteis</a>
<a href="ganhar-dinheiro.html">💰 Ganhar €</a>
<a href="painel.html">📊 Painel</a>
</nav>

<div class="container">

<h2 id="titulo"></h2>

<!-- anúncio topo -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="SEU_ID"
data-ad-slot="111"
data-ad-format="auto"
data-full-width-responsive="true"></ins>

<div id="news"></div>

</div>

<script>

// categoria dinâmica
const params = new URLSearchParams(window.location.search);
const categoria = params.get("tema") || "geral";

document.getElementById("titulo").innerText = categoria.toUpperCase();
document.getElementById("pageTitle").innerText = "Notícias " + categoria + " hoje";

// texto automático
function gerarTexto(){
  return "<p>Atualização recente relevante.</p>";
}

// guardar interesses
function guardarInteresse(tipo){
  let dados = JSON.parse(localStorage.getItem("interesses")) || {};
  dados[tipo] = (dados[tipo] || 0) + 1;
  localStorage.setItem("interesses", JSON.stringify(dados));
}

// recomendação inteligente
function gerarRecomendacao(titulo){
  titulo = (titulo || "").toLowerCase();
  let dados = JSON.parse(localStorage.getItem("interesses")) || {};
  let rec;

  if(dados["tecnologia"] > 2){
    rec = {nome:"📱 Telemóveis", url:"melhores-telemoveis.html", tipo:"tecnologia"};
  }
  else if(dados["dinheiro"] > 2){
    rec = {nome:"💰 Ganhar dinheiro", url:"ganhar-dinheiro.html", tipo:"dinheiro"};
  }
  else{
    if(titulo.includes("iphone") || titulo.includes("android")){
      rec = {nome:"📱 Telemóveis", url:"melhores-telemoveis.html", tipo:"tecnologia"};
    }
    else if(titulo.includes("economia") || titulo.includes("dinheiro")){
      rec = {nome:"💰 Ganhar dinheiro", url:"ganhar-dinheiro.html", tipo:"dinheiro"};
    }
    else{
      rec = {nome:"💻 Portáteis", url:"melhores-portateis.html", tipo:"tecnologia"};
    }
  }

  return `
  <div class="reco">
    <p>💰 Recomendado para si:</p>
    <a href="${rec.url}" onclick="guardarInteresse('${rec.tipo}')">
      <button>👉 ${rec.nome}</button>
    </a>
  </div>`;
}

// feeds
const feedsPorCategoria = {
  geral:[
    "https://api.rss2json.com/v1/api.json?rss_url=https://www.rtp.pt/noticias/rss"
  ],
  tecnologia:[
    "https://api.rss2json.com/v1/api.json?rss_url=https://pplware.sapo.pt/feed/"
  ],
  economia:[
    "https://api.rss2json.com/v1/api.json?rss_url=https://eco.sapo.pt/feed/"
  ],
  desporto:[
    "https://api.rss2json.com/v1/api.json?rss_url=https://www.abola.pt/rss"
  ],
  mundo:[
    "https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/news/rss.xml"
  ]
};

const feeds = feedsPorCategoria[categoria] || feedsPorCategoria["geral"];

async function loadNews(){

  let allNews = [];
  const container = document.getElementById("news");

  for(const url of feeds){
    try{
      const res = await fetch(url);
      const data = await res.json();
      if(data.items) allNews.push(...data.items);
    }catch(e){
      console.error("Erro feed:", e);
    }
  }

  // remover duplicados
  allNews = allNews.filter((v,i,a)=>
    a.findIndex(t=>t.title === v.title) === i
  );

  // ordenar por data
  allNews.sort((a,b)=> new Date(b.pubDate) - new Date(a.pubDate));

  let html = "";

  allNews.slice(0,50).forEach(n=>{

    html += `
    <div class="card">

      ${n.thumbnail ? `<img src="${n.thumbnail}" loading="lazy">` : ""}

      <h3>${n.title || "Sem título"}</h3>

      ${gerarTexto()}

      <p>${(n.description || "").substring(0,120)}...</p>

      ${gerarRecomendacao(n.title)}

      <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="SEU_ID"
      data-ad-slot="222"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>

      <a href="${n.link}" target="_blank" rel="noopener noreferrer">Ler notícia completa</a>

    </div>`;
  });

  container.innerHTML = html;

  (adsbygoogle = window.adsbygoogle || []).push({});
}

// ativar anúncio topo
(adsbygoogle = window.adsbygoogle || []).push({});

loadNews();

</script>

</body>
</html>
