<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashNotícias | Últimas notícias virais</title>

<meta name="description" content="Últimas notícias de Portugal e do mundo com maior impacto e atualidade">

<style>
body { margin:0; font-family: Arial; background:#eef1f5 }

header {
  background:#c40000;
  color:#fff;
  padding:20px;
  text-align:center;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.stats {
  background:#fff;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  text-align:center;
}

.destaque {
  background:#ffcc00;
  padding:12px;
  margin-bottom:15px;
  font-weight:bold;
}

.card {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>⚡ FlashNotícias</h1>
<p>Notícias mais relevantes e virais</p>
</header>

<div class="container">
<div class="stats" id="stats"></div>
<div id="app">🔄 A carregar notícias...</div>
</div>

<script>

const API_URL = "https://newsapi.org/v2/top-headlines?country=pt&apiKey=2d89f5a76883471f94d8f753c5794413";

// visitas
let visitas = Number(localStorage.getItem("visitas") || 0);
visitas++;
localStorage.setItem("visitas", visitas);

// ganhos
let ganhoTotal = Number(localStorage.getItem("ganhoTotal") || 0);

// stats
function atualizarStats(){
  document.getElementById("stats").textContent =
    `👁️ ${visitas} visitas | 💰 ${ganhoTotal.toFixed(2)}€`;
}

// slug seguro
function slug(t){
  return (t || "id").toLowerCase().replace(/[^a-z0-9]+/g,'-');
}

// clique
function registarClique(n){
  const id = slug(n.title);

  let clicks = Number(localStorage.getItem("click_"+id) || 0);
  clicks++;
  localStorage.setItem("click_"+id, clicks);

  ganhoTotal += 0.03;
  localStorage.setItem("ganhoTotal", ganhoTotal);

  atualizarStats();
}

// abrir notícia
function abrir(n){
  if(n && n.url){
    registarClique(n);
    window.open(n.url, "_blank", "noopener,noreferrer");
  }
}

// título viral
function tituloViral(t){
  if(!t) return "Notícia importante";
  if(t.toLowerCase().includes("última hora")) return t;
  return "🔴 ÚLTIMA HORA: " + t;
}

// score
function score(n){
  let s = 0;
  const t = (n.title || "").toLowerCase();

  ["morte","crise","guerra","acidente","urgente"].forEach(p=>{
    if(t.includes(p)) s+=3;
  });

  if(n.urlToImage) s+=2;

  return s;
}

// criar card
function criarCard(n){

  const card = document.createElement("div");
  card.className = "card";
  card.onclick = () => abrir(n);

  if(n.urlToImage){
    const img = document.createElement("img");
    img.src = n.urlToImage;
    img.onerror = () => img.remove();
    card.appendChild(img);
  }

  const h2 = document.createElement("h2");
  h2.textContent = tituloViral(n.title);

  const p = document.createElement("p");
  p.textContent = n.description || "Sem descrição disponível";

  card.appendChild(h2);
  card.appendChild(p);

  return card;
}

// carregar notícias
async function loadNews(){

  const container = document.getElementById("app");

  try {

    const res = await fetch(API_URL);

    if(!res.ok){
      throw new Error("Erro HTTP");
    }

    const data = await res.json();

    if(!data || !Array.isArray(data.articles)){
      throw new Error("Dados inválidos");
    }

    let artigos = data.articles.filter(n => n && n.title);

    if(artigos.length === 0){
      throw new Error("Sem notícias");
    }

    artigos.sort((a,b)=>score(b)-score(a));

    container.innerHTML = "";

    const destaque = document.createElement("div");
    destaque.className = "destaque";
    destaque.textContent = tituloViral(artigos[0].title || "Sem destaque");
    container.appendChild(destaque);

    artigos.slice(0,10).forEach(n=>{
      container.appendChild(criarCard(n));
    });

  } catch(e){
    container.textContent = "⚠️ Erro ao carregar notícias";
    console.error(e);
  }
}

// iniciar
document.addEventListener("DOMContentLoaded", ()=>{
  atualizarStats();
  loadNews();
});

</script>

</body>
</html>
